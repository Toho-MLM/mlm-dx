name = "mlm-dx-worker"
main = "src/index.ts"
compatibility_date = "2024-12-20"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[triggers]
crons = ["0 15 * * *"]

[env.development]
name = "mlm-dx-worker-dev"

[env.production]
name = "mlm-dx-worker"

[[d1_databases]]
binding = "DB"
database_name = "mlm-dx-db"
database_id = "local"

[[durable_objects.bindings]]
name = "BAND_DRAFT_ROOM"
class_name = "BandDraftRoom"

[[durable_objects.bindings]]
name = "RESERVATION_ROOM"
class_name = "ReservationRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BandDraftRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["ReservationRoom"]

[env.production.vars]
NODE_ENV = ""
AUTH_URL = ""
AUTH_SECRET = ""
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
CORS_ORIGIN = ""
FRONTEND_URL = ""
SMTP_HOST = ""
SMTP_PORT = ""
SMTP_SECURITY = ""
SMTP_FROM_EMAIL = ""
SMTP_FROM_NAME = ""

[[env.production.d1_databases]]
binding = "DB"
database_name = "mlm-dx-db"
database_id = ""

[[env.production.durable_objects.bindings]]
name = "BAND_DRAFT_ROOM"
class_name = "BandDraftRoom"

[[env.production.durable_objects.bindings]]
name = "RESERVATION_ROOM"
class_name = "ReservationRoom"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 1
