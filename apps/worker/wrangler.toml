name = "mlm-dx-worker"
main = "src/index.ts"
compatibility_date = "2024-12-20"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 15 * * *"]

[env.development]
name = "mlm-dx-worker-dev"

[env.production]
name = "mlm-dx-worker"

[[d1_databases]]
binding = "DB"
database_name = "mlm-dx-db"
database_id = "local"

[env.production.vars]
NODE_ENV = ""
AUTH_URL = ""
AUTH_SECRET = ""
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
CORS_ORIGIN = ""
FRONTEND_URL = ""

[[env.production.d1_databases]]
binding = "DB"
database_name = "mlm-dx-db"
database_id = ""

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 1