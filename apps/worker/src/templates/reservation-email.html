<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{NOTIFICATION_TITLE}}</title>
  </head>
  <body style="margin:0;padding:0;background:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;color:#111827;">
    <div style="display:none;max-height:0;overflow:hidden;">{{PREHEADER}}</div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f3f4f6;">
      <tr>
        <td style="padding:24px 12px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;margin:0 auto;background:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);">
            <tr>
              <td style="padding:24px;background:#111827;color:#ffffff;font-size:20px;font-weight:700;">{{NOTIFICATION_TITLE}}</td>
            </tr>
            <tr>
              <td style="padding:24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border:1px solid #e5e7eb;border-radius:10px;border-collapse:separate;border-spacing:0;overflow:hidden;">
                  <tr>
                    <th style="padding:10px 12px;text-align:left;color:#6b7280;font-size:13px;white-space:nowrap;border-bottom:1px solid #e5e7eb;">場所</th>
                    <td style="padding:10px 12px;color:#111827;font-size:14px;border-bottom:1px solid #e5e7eb;">{{LOCATION}}</td>
                  </tr>
                  <tr>
                    <th style="padding:10px 12px;text-align:left;color:#6b7280;font-size:13px;white-space:nowrap;border-bottom:1px solid #e5e7eb;">予約名義</th>
                    <td style="padding:10px 12px;color:#111827;font-size:14px;border-bottom:1px solid #e5e7eb;">{{RESERVATION_NAME}}</td>
                  </tr>
                  <tr>
                    <th style="padding:10px 12px;text-align:left;color:#6b7280;font-size:13px;white-space:nowrap;border-bottom:1px solid #e5e7eb;">申請者</th>
                    <td style="padding:10px 12px;color:#111827;font-size:14px;border-bottom:1px solid #e5e7eb;">{{REQUESTER_NAME}}</td>
                  </tr>
                  <tr>
                    <th style="padding:10px 12px;text-align:left;color:#6b7280;font-size:13px;white-space:nowrap;border-bottom:1px solid #e5e7eb;">ステータス</th>
                    <td style="padding:10px 12px;color:#111827;font-size:14px;border-bottom:1px solid #e5e7eb;">{{RESERVATION_STATUS}}</td>
                  </tr>
                  <tr>
                    <th style="padding:10px 12px;text-align:left;color:#6b7280;font-size:13px;white-space:nowrap;">{{DETAIL_LABEL}}</th>
                    <td style="padding:10px 12px;color:#111827;font-size:14px;">{{DETAIL_CONTENT}}</td>
                  </tr>
                </table>
                <div style="padding-top:24px;text-align:center;">
                  <a href="{{RESERVATION_URL}}" style="display:inline-block;padding:12px 22px;border-radius:8px;background:#111827;color:#ffffff;text-decoration:none;font-weight:700;">予約を確認する</a>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 24px;background:#f9fafb;color:#6b7280;font-size:12px;line-height:1.6;">このメールは自動送信されています。</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
