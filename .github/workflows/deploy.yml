name: Deploy Frontend and Backend to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy_frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Deploy Frontend with OpenNext for Cloudflare Workers
        working-directory: apps/web
        run: npm run deploy
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: "${{ vars.NEXT_PUBLIC_API_URL }}"
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID: "${{ vars.CLOUDFLARE_ACCOUNT_ID }}"

  deploy_backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Update wrangler.toml with environment variables
        working-directory: apps/worker
        run: |
          sed -i "s|NODE_ENV = \"\"|NODE_ENV = \"${{ vars.NODE_ENV }}\"|" wrangler.toml
          sed -i "s|AUTH_URL = \"\"|AUTH_URL = \"${{ vars.AUTH_URL }}\"|" wrangler.toml
          sed -i "s|AUTH_SECRET = \"\"|AUTH_SECRET = \"${{ secrets.AUTH_SECRET }}\"|" wrangler.toml
          sed -i "s|GOOGLE_CLIENT_ID = \"\"|GOOGLE_CLIENT_ID = \"${{ secrets.GOOGLE_CLIENT_ID }}\"|" wrangler.toml
          sed -i "s|GOOGLE_CLIENT_SECRET = \"\"|GOOGLE_CLIENT_SECRET = \"${{ secrets.GOOGLE_CLIENT_SECRET }}\"|" wrangler.toml
          sed -i "s|CORS_ORIGIN = \"\"|CORS_ORIGIN = \"${{ vars.CORS_ORIGIN }}\"|" wrangler.toml
          sed -i "s|FRONTEND_URL = \"\"|FRONTEND_URL = \"${{ vars.FRONTEND_URL }}\"|" wrangler.toml
          sed -i "/^\[\[d1_databases\]\]/,/^\[/{s|database_id = \"\"|database_id = \"${{ vars.D1_DATABASE_ID }}\"|}" wrangler.toml
      - name: Deploy to Cloudflare Workers with Wrangler
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy --env production
