name: Deploy Frontend and Backend to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy_frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Deploy Frontend with OpenNext for Cloudflare Workers
        working-directory: apps/web
        run: npm run deploy
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

  deploy_backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Update wrangler.toml with D1_DATABASE_ID
        working-directory: apps/worker
        run: |
          sed -i "s|database_id = \"\"|database_id = \"${{ vars.D1_DATABASE_ID }}\"|" wrangler.toml
      - name: Deploy to Cloudflare Workers with Wrangler
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: >
            deploy --env production
            --var NODE_ENV=${{ vars.NODE_ENV }}
            --var AUTH_URL=${{ vars.AUTH_URL }}
            --var AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            --var GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            --var GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            --var CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
            --var FRONTEND_URL=${{ vars.FRONTEND_URL }}
