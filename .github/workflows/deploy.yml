name: Deploy Frontend and Backend to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy_backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check Backend
        run: pnpm --filter mlm-dx-worker type-check
      - name: Update wrangler.toml with environment variables
        working-directory: apps/worker
        run: |
          sed -i "s|NODE_ENV = \"\"|NODE_ENV = \"${{ vars.NODE_ENV }}\"|" wrangler.toml
          sed -i "s|AUTH_URL = \"\"|AUTH_URL = \"${{ vars.AUTH_URL }}\"|" wrangler.toml
          sed -i "s|AUTH_SECRET = \"\"|AUTH_SECRET = \"${{ secrets.AUTH_SECRET }}\"|" wrangler.toml
          sed -i "s|GOOGLE_CLIENT_ID = \"\"|GOOGLE_CLIENT_ID = \"${{ secrets.GOOGLE_CLIENT_ID }}\"|" wrangler.toml
          sed -i "s|GOOGLE_CLIENT_SECRET = \"\"|GOOGLE_CLIENT_SECRET = \"${{ secrets.GOOGLE_CLIENT_SECRET }}\"|" wrangler.toml
          sed -i "s|CORS_ORIGIN = \"\"|CORS_ORIGIN = \"${{ vars.CORS_ORIGIN }}\"|" wrangler.toml
          sed -i "s|FRONTEND_URL = \"\"|FRONTEND_URL = \"${{ vars.FRONTEND_URL }}\"|" wrangler.toml
          sed -i "/^\[\[env\.production\.d1_databases\]\]/,/^\[/{s|database_id = \"\"|database_id = \"${{ vars.D1_DATABASE_ID }}\"|}" wrangler.toml
      - name: Check for D1 migration files
        id: d1_migrations
        working-directory: apps/worker
        run: |
          if find migrations -maxdepth 1 -type f -name '*.sql' | grep -q .; then
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply D1 migrations
        if: steps.d1_migrations.outputs.has_migrations == 'true'
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: d1 migrations apply mlm-dx-db --env production --remote
          packageManager: pnpm
      - name: Delete applied D1 migration files
        if: steps.d1_migrations.outputs.has_migrations == 'true'
        working-directory: apps/worker
        run: find migrations -maxdepth 1 -type f -name '*.sql' -delete
      - name: Commit deleted D1 migration files
        if: steps.d1_migrations.outputs.has_migrations == 'true'
        run: |
          if git diff --quiet -- apps/worker/migrations; then
            echo "No migration files to delete."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/worker/migrations
          git commit -m "chore: remove applied d1 migrations [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
      - name: Deploy to Cloudflare Workers with Wrangler
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy --env production
          packageManager: pnpm

  deploy_frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check Frontend
        run: pnpm --filter mlm-dx-web type-check
      - name: Deploy Frontend with OpenNext for Cloudflare Workers
        working-directory: apps/web
        run: pnpm run deploy
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: "${{ vars.NEXT_PUBLIC_API_URL }}"
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID: "${{ vars.CLOUDFLARE_ACCOUNT_ID }}"
